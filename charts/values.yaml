# Base values for the Console chart.
# Override per-flavor with values-cloud.yaml or values-onprem.yaml.

images:
  console: "intel/device-mgmt-toolkit-console:latest"
  rps: "intel/device-mgmt-toolkit-rps:latest"
  webui: "intel/device-mgmt-toolkit-web-ui:latest"
  mpsrouter: "intel/device-mgmt-toolkit-mps-router:latest"

console:
  enabled: true
  headless: false
  commonName:
  replicaCount: 1
  logLevel: "info"

rps:
  enabled: true
  replicaCount: 1
  logLevel: "info"

webui:
  enabled: false
  replicaCount: 1

mpsrouter:
  enabled: false
  replicaCount: 1

vault:
  injector:
    annotations:
      kuma.io/sidecar-injection: disabled
  server:
    annotations:
      kuma.io/sidecar-injection: disabled
  ui:
    annotations:
      kuma.io/sidecar-injection: disabled
    enabled: true
    serviceType: "ClusterIP"

kong:
  enabled: false
  podAnnotations:
    kuma.io/sidecar-injection: enabled
    kuma.io/gateway: enabled
  env:
    UPSTREAM_KEEPALIVE_POOL_SIZE: 0
  proxy:
    annotations:
      service.beta.kubernetes.io/azure-dns-label-name: ""
    stream:
      - containerPort: 4433
        servicePort: 4433
        parameters: []
    http:
      enabled: false
