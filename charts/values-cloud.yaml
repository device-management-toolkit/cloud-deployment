# Cloud overlay: headless Console + sample-web-ui + kong + mps-router.
# Use: helm install console ./charts -f ./charts/values-cloud.yaml

console:
  headless: true

webui:
  enabled: true

mpsrouter:
  enabled: true

kong:
  enabled: true

vault:
  ui:
    serviceType: "LoadBalancer"
